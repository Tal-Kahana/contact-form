<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>צור קשר</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 32px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1f2937;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9ca3af;
    }

    input:focus,
    textarea:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 130px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #4338ca;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      display: none;
      font-size: 0.8rem;
      color: #dc2626;
      margin-top: 5px;
    }

    .success-msg {
      font-size: 0.9rem;
      font-weight: 600;
      color: #16a34a;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 8px;
      padding: 0 16px;
      text-align: center;
      margin-top: 16px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.4s ease, max-height 0.4s ease, padding 0.4s ease;
    }

    .success-msg.visible {
      opacity: 1;
      max-height: 80px;
      padding: 12px 16px;
    }

    input.invalid,
    textarea.invalid {
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }

    input.valid,
    textarea.valid {
      border-color: #16a34a;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>צור קשר</h1>
    <form>
      <div class="form-group">
        <label for="fullname">שם מלא</label>
        <input type="text" id="fullname" name="fullname" placeholder="הכנס את שמך המלא" required>
      </div>

      <div class="form-group">
        <label for="email">אימייל</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
      </div>

      <div class="form-group">
        <label for="phone">טלפון</label>
        <input type="tel" id="phone" name="phone" placeholder="05X-XXXXXXX">
      </div>

      <div class="form-group">
        <label for="message">הודעה</label>
        <textarea id="message" name="message" placeholder="כתוב את הודעתך כאן..." required></textarea>
      </div>

      <button type="submit">שלח</button>
      <div class="success-msg" id="successMsg">ההודעה נשלחה בהצלחה! נחזור אליך בקרוב.</div>
    </form>
  </div>

  <script>
    const form = document.querySelector('form');

    const rules = {
      fullname: {
        el: document.getElementById('fullname'),
        validate: v => v.trim().length > 0,
        msg: 'נא להזין שם מלא'
      },
      email: {
        el: document.getElementById('email'),
        validate: v => v.includes('@') && v.indexOf('@') > 0 && v.indexOf('@') < v.length - 1,
        msg: 'נא להזין כתובת אימייל תקינה'
      },
      phone: {
        el: document.getElementById('phone'),
        validate: v => /^\d{9,10}$/.test(v.replace(/[-\s]/g, '')),
        msg: 'הטלפון חייב להכיל 9–10 ספרות בלבד'
      },
      message: {
        el: document.getElementById('message'),
        validate: v => v.trim().length >= 10,
        msg: 'ההודעה חייבת להכיל לפחות 10 תווים'
      }
    };

    function getErrorEl(input) {
      let err = input.parentElement.querySelector('.error-msg');
      if (!err) {
        err = document.createElement('span');
        err.className = 'error-msg';
        input.parentElement.appendChild(err);
      }
      return err;
    }

    function validateField(rule) {
      const val = rule.el.value;
      const ok = rule.validate(val);
      const errEl = getErrorEl(rule.el);

      rule.el.classList.toggle('invalid', !ok);
      rule.el.classList.toggle('valid', ok);
      errEl.textContent = rule.msg;
      errEl.style.display = ok ? 'none' : 'block';

      return ok;
    }

    Object.values(rules).forEach(rule => {
      rule.el.addEventListener('input', () => validateField(rule));
    });

    const submitBtn = form.querySelector('button[type="submit"]');
    const successMsg = document.getElementById('successMsg');

    form.addEventListener('submit', e => {
      e.preventDefault();
      const allValid = Object.values(rules).map(validateField).every(Boolean);

      if (allValid) {
        submitBtn.disabled = true;

        const { fullname, email, phone, message } = rules;
        alert(
          `פרטים שנשלחו:\n\n` +
          `שם: ${fullname.el.value}\n` +
          `אימייל: ${email.el.value}\n` +
          `טלפון: ${phone.el.value}\n` +
          `הודעה: ${message.el.value}`
        );

        form.reset();
        Object.values(rules).forEach(r => r.el.classList.remove('valid'));

        requestAnimationFrame(() => requestAnimationFrame(() => {
          successMsg.classList.add('visible');
          setTimeout(() => {
            successMsg.classList.remove('visible');
            submitBtn.disabled = false;
          }, 4000);
        }));
      } else {
        successMsg.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
